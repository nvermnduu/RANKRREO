</head>
<body>

  <h1>RANKEA ESTO😜</h1>

  <!-- APP -->
  <div id="app" style="display:none;">
    <p id="bienvenida"></p>

    <input type="text" id="lugar" placeholder="Nombre del lugar">
    <button onclick="agregarLugar()">Agregar lugar</button>

    <div id="lugares"></div>
  </div>

  <!-- Firebase -->
